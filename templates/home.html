<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Portal</title>
    <style>
        body {
            background-color: #1a1c23;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #222530;
            border: 1px solid #2e3244;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 16px;
            transition: opacity 0.2s;
        }
        .btn-primary { background-color: #5e81ac; color: #fff; }
        .btn-secondary { background-color: #a3be8c; color: #2e3440; }
        .btn:hover { opacity: 0.9; }
        .separator {
            border-top: 1px solid #2e3244;
            margin: 25px 0;
        }
        .input-box {
            width: 100%;
            background-color: #1a1c23;
            border: 1px solid #2e3244;
            color: #fff;
            padding: 14px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .input-box:focus { outline: 1px solid #5e81ac; }

        /* Bottom Info Section */
        .footer-info {
            text-align: center;
            font-family: monospace;
            font-size: 12px;
            color: #4c566a;
            line-height: 1.6;
            letter-spacing: 1px;
        }
        .footer-brand {
            font-size: 14px;
            font-weight: bold;
            color: #5e81ac;
            margin-bottom: 6px;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-primary" onclick="createMonitorSession()">HOST MONITOR CONSOLE</button>
    
    <div class="separator"></div>
    
    <input type="text" id="roomCodeInput" class="input-box" placeholder="ENTER ROOM CODE" maxlength="6">
    <button class="btn btn-secondary" onclick="joinAsCameraNode()">CONNECT CAMERA NODE</button>
</div>

<div class="footer-info">
    <div class="footer-brand">ATULYA TECH</div>
    <div>CONTACTS -</div>
    <div>EMAIL - notserious6967@gmail.com</div>
</div>

<script>
    function createMonitorSession() {
        fetch('/create-room', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if(data.room_code) {
                window.location.href = '/receiver/' + data.room_code;
            }
        })
        .catch(err => alert("Error building session."));
    }

    function joinAsCameraNode() {
        const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
        if(code.length === 6) {
            window.location.href = '/camera/' + code;
        } else {
            alert("Please enter a valid 6-character Room Code.");
        }
    }
</script>
</body>
</html>
