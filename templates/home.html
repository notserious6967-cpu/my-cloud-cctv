<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; margin: 20px auto; max-width: 400px; border-radius: 8px; }
        button, input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; }
        input { background: #333; color: white; text-align: center; }
    </style>
</head>
<body>
    <h1>🏠 Local CCTV Network</h1>
    <div class="card">
        <h3>Create a New Room</h3>
        <form action="/create" method="POST"><button type="submit">Create Room Dashboard</button></form>
    </div>
    <div class="card">
        <h3>Join Existing Room</h3>
        <form action="/join" method="POST">
            <input type="text" name="room_id" placeholder="Enter Room Code" required autocomplete="off"><br>
            <button type="submit" style="background: #28a745;">Join Room</button>
        </form>
    </div>
</body>
</html>
