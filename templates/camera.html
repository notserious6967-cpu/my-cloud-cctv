<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera node</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 400px; background: black; border-radius: 8px; margin-top: 10px; }
        input, button { padding: 12px; margin: 10px; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #dc3545; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <h2>📷 CCTV Camera Transmitter</h2>
    <p>Room: <strong>{{ room_id }}</strong></p>
    <div id="setup">
        <input type="text" id="camName" placeholder="e.g. Front Door, Kitchen" required><br>
        <button onclick="startCamera()">Start Broadcasting</button>
    </div>
    <div id="stream-area" style="display:none;">
        <h3 id="display-name"></h3>
        <video id="preview" autoplay playsinline muted></video>
        <p style="color: #28a745;">● LIVE STREAMING ACTIVE</p>
    </div>
    <script>
        const socket = io();
        const roomId = "{{ room_id }}";
        let localStream;
        let peerConnections = {};

        async function startCamera() {
            const name = document.getElementById('camName').value.trim();
            if (!name) return alert("Please name your camera device");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('stream-area').style.display = 'block';
            document.getElementById('display-name').innerText = "Camera Node: " + name;

            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            document.getElementById('preview').srcObject = localStream;
            socket.emit('camera_join', { room: roomId, name: name });
        }

        socket.on('signal', async (data) => {
            if (data.to !== socket.id) return;
            let pc = peerConnections[data.from];
            if (!pc) {
                pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                peerConnections[data.from] = pc;
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                pc.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', { room: roomId, to: data.from, from: socket.id, candidate: e.candidate }); };
            }
            if (data.offer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { room: roomId, to: data.from, from: socket.id, answer: answer });
            } else if (data.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
    </script>
</body>
</html>
