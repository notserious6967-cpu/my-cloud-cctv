<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atulya Tech Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.7.2/socketio.min.js"></script>
    <style>
        body {
            background-color: #12141c;
            color: #e5e9f0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px 20px 100px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Top Bar with clean Branding and visible Room Code */
        .dashboard-header {
            max-width: 1400px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1c24;
            padding: 16px 24px;
            border-radius: 8px;
            border: 1px solid #2e3244;
        }
        .brand-logo {
            font-size: 20px;
            font-weight: 700;
            color: #5e81ac;
            letter-spacing: 0.5px;
        }
        .room-tag {
            font-family: monospace;
            font-size: 16px;
            background: #222530;
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid #3b4252;
            color: #88c0d0;
            font-weight: bold;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .cam-card {
            background: #1a1c24;
            border: 1px solid #2e3244;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .feed-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }
        video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .motion-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Individual Corner Mute Button styling */
        .audio-toggle-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            z-index: 10;
            background: rgba(26, 28, 36, 0.85);
            border: 1px solid #2e3244;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }

        .hud-overlay {
            position: absolute;
            top: 12px; left: 12px;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 3px;
            z-index: 10;
        }

        /* Fixed Bottom Control Bar */
        .bottom-bar {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 800px;
            background: rgba(26, 28, 36, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 1000;
        }
        .sys-info { display: flex; gap: 24px; font-family: monospace; font-size: 14px; color: #d8dee9; }
        
        /* Modern Toggle Switch Style for Boxes */
        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; }
        .switch {
            position: relative; display: inline-block; width: 44px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4c566a; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #a3be8c; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="dashboard-header">
    <div class="brand-logo">Atulya Tech</div>
    <div class="room-tag">ROOM CODE: <span id="roomCodeDisplay">------</span></div>
</div>

<div class="matrix-grid" id="nodeMatrix"></div>

<div class="bottom-bar">
    <div class="sys-info">
        <div id="liveClock">00:00:00</div>
        <div>PING: <span id="pingCounter">--</span>ms</div>
    </div>
    
    <div class="switch-container">
        <span>TRACKING BOXES</span>
        <label class="switch">
            <input type="checkbox" id="boxToggle" checked onchange="toggleTracking(this.checked)">
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
    const roomCode = "${room_code}";
    const socket = io();
    const nodeMatrix = document.getElementById('nodeMatrix');
    const peers = {};
    let showTrackingBoxes = true;

    document.getElementById('roomCodeDisplay').innerText = roomCode;
    socket.emit('join_room', { room: roomCode, role: 'receiver' });

    // Ping & Clock systems
    setInterval(() => {
        const start = Date.now();
        socket.emit('ping_test', () => {
            document.getElementById('pingCounter').innerText = Date.now() - start;
        });
    }, 3000);

    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toTimeString().split(' ')[0];
    }, 1000);

    socket.on('camera_connected', (data) => {
        buildCameraCard(data.id, data.name);
        connectPeer(data.id);
    });

    socket.on('camera_disconnected', (data) => {
        const el = document.getElementById(`node-${data.id}`);
        if(el) el.remove();
        if(peers[data.id]) peers[data.id].close();
    });

    socket.on('signal', (data) => {
        if(peers[data.sender]) peers[data.sender].setRemoteDescription(new RTCSessionDescription(data.signal));
    });

    function buildCameraCard(id, name) {
        if(document.getElementById(`node-${id}`)) return;

        const card = document.createElement('div');
        card.className = 'cam-card';
        card.id = `node-${id}`;
        card.innerHTML = `
            <div class="feed-container">
                <div class="hud-overlay">${name.toUpperCase()}</div>
                <video id="video-${id}" autoplay playsinline muted></video>
                <canvas id="canvas-${id}" class="motion-layer"></canvas>
                <button id="mute-${id}" class="audio-toggle-btn" onclick="toggleAudio('${id}')">🔇</button>
            </div>
        `;
        nodeMatrix.appendChild(card);
        bindMotion(id);
    }

    function toggleAudio(id) {
        const v = document.getElementById(`video-${id}`);
        const b = document.getElementById(`mute-${id}`);
        if(v && b) {
            v.muted = !v.muted;
            b.innerText = v.muted ? "🔇" : "🔊";
        }
    }

    function toggleTracking(isChecked) {
        showTrackingBoxes = isChecked;
        if(!isChecked) {
            document.querySelectorAll('.motion-layer').forEach(c => {
                c.getContext('2d').clearRect(0,0,c.width,c.height);
            });
        }
    }

    function connectPeer(camId) {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        peers[camId] = pc;
        pc.ontrack = (e) => {
            const v = document.getElementById(`video-${camId}`);
            if(v) v.srcObject = e.streams[0];
        };
        pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
            socket.emit('signal', { target: camId, signal: pc.localDescription, room: roomCode });
        });
    }

    function bindMotion(id) {
        const video = document.getElementById(`video-${id}`);
        const canvas = document.getElementById(`canvas-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let priorFrame;

        function process() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                const bc = document.createElement('canvas');
                bc.width = canvas.width; bc.height = canvas.height;
                const bx = bc.getContext('2d');
                bx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const currentFrame = bx.getImageData(0, 0, canvas.width, canvas.height);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (priorFrame && showTrackingBoxes) {
                    let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;
                    let hits = 0;
                    for (let i = 0; i < currentFrame.data.length; i += 4) {
                        const d = Math.abs(currentFrame.data[i] - priorFrame.data[i]) + 
                                  Math.abs(currentFrame.data[i+1] - priorFrame.data[i+1]) + 
                                  Math.abs(currentFrame.data[i+2] - priorFrame.data[i+2]);
                        if (d > 95) {
                            const idx = i / 4;
                            const x = idx % canvas.width; const y = Math.floor(idx / canvas.width);
                            if(x < minX) minX = x; if(x > maxX) maxX = x;
                            if(y < minY) minY = y; if(y > maxY) maxY = y;
                            hits++;
                        }
                    }
                    if (hits > 450) {
                        ctx.strokeStyle = '#00d2ff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(minX, minY, (maxX - minX), (maxY - minY));
                    }
                }
                priorFrame = currentFrame;
            }
            requestAnimationFrame(process);
        }
        video.addEventListener('play', () => requestAnimationFrame(process));
    }
</script>
</body>
</html>
