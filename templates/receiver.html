<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-box { background: #1e1e1e; padding: 10px; border-radius: 8px; position: relative; }
        video { width: 100%; background: black; border-radius: 4px; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <h2>📱 Live CCTV Monitor Dashboard</h2>
    <p>Room Monitoring Code: <strong style="color:#007bff;">{{ room_id }}</strong></p>
    <div class="grid" id="cameraGrid"></div>
    <script>
        const socket = io();
        const roomId = "{{ room_id }}";
        let peerConnections = {};

        socket.emit('receiver_join', { room: roomId });

        socket.on('signal', async (data) => {
            if (data.to && data.to !== socket.id) return;
            let pc = peerConnections[data.from];
            if (data.answer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate && pc) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on('new_camera_online', async (data) => {
            const camId = data.id, camName = data.name;
            if (document.getElementById(camId)) return;

            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            peerConnections[camId] = pc;

            pc.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', { room: roomId, to: camId, from: socket.id, candidate: e.candidate }); };
            pc.ontrack = (e) => {
                if (document.getElementById(camId)) return;
                const grid = document.getElementById('cameraGrid');
                const box = document.createElement('div');
                box.className = 'video-box'; box.id = camId;
                const video = document.createElement('video');
                video.srcObject = e.streams[0]; video.autoplay = true; video.playsInline = true;
                const label = document.createElement('div');
                label.className = 'label'; label.innerText = camName;
                box.appendChild(video); box.appendChild(label); grid.appendChild(box);
            };

            const offer = await pc.createOffer({ offerToReceiveVideo: true });
            await pc.setLocalDescription(offer);
            socket.emit('signal', { room: roomId, to: camId, from: socket.id, offer: offer });
        });

        socket.on('camera_disconnected', (camId) => {
            const el = document.getElementById(camId);
            if (el) el.remove();
            if (peerConnections[camId]) { peerConnections[camId].close(); delete peerConnections[camId]; }
        });
    </script>
</body>
</html>
